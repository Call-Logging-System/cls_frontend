<div class="sidenav-inner">
  <!-- Nav -->
  <div class="nav-list">
    @for (item of navItems; track item.path) {
      @if (isAllowed(item.path)) {
        <a
          class="nav-item"
          (click)="navigateTo(item.path)"
          [class.active-link]="router.url === item.path"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    }
  </div>

  <!-- Bottom user section -->
  <div class="sidenav-user-section">
    <div class="avatar">{{ authService.userName()?.charAt(0)?.toUpperCase() }}</div>
    <div class="user-role">
      {{ authService.userRole() != null ? roles[authService.userRole()! - 1] : '' }}
    </div>
  </div>
</div>

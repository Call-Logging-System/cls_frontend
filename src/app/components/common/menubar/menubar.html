<div class="sidenav-inner">
  <!-- Nav -->
  <div class="nav-list">
    <a class="nav-item" (click)="navigateTo('/call-logs')"
       [class.active-link]="router.url === '/call-logs'">
      <mat-icon>call</mat-icon>
      <span class="nav-label">Call Logs</span>
    </a>
    <a class="nav-item" (click)="navigateTo('/phone-book')"
       [class.active-link]="router.url === '/phone-book'">
      <mat-icon>contacts</mat-icon>
      <span class="nav-label">Phone Book</span>
    </a>
    <a class="nav-item" (click)="navigateTo('/user-management')"
       [class.active-link]="router.url === '/user-management'">
      <mat-icon>people</mat-icon>
      <span class="nav-label">Users</span>
    </a>
  </div>

  <!-- Bottom user section -->
  <div class="sidenav-user-section">
    <div class="avatar">{{ authService.userName()?.charAt(0)?.toUpperCase() }}</div>
    <div class="user-role">
      {{ authService.userRole() != null ? roles[authService.userRole()! - 1] : '' }}
    </div>
  </div>
</div>

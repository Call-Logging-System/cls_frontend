<!-- confirm-dialog.html -->
<div class="cls-dialog-container">
  <!-- Icon -->
  <div class="cls-dialog-icon-wrap danger">
    <mat-icon>delete_outline</mat-icon>
  </div>

  <!-- Text -->
  <h2 class="cls-dialog-title">Delete Record</h2>
  <p class="cls-dialog-message">
    Are you sure you want to delete the record for
    <strong>"{{ data.issue }}"</strong>?
    <span class="cls-dialog-sub">This action cannot be undone.</span>
  </p>

  <!-- Actions -->
  <div class="cls-dialog-actions">
    <button mat-button class="ghost-btn" (click)="onCancel()">Cancel</button>
    <button mat-raised-button class="danger-btn" (click)="onConfirm()">
      <mat-icon>delete</mat-icon>
      Delete
    </button>
  </div>
</div>

<h2 mat-dialog-title>Add Username</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Username</mat-label>
    <input matInput [(ngModel)]="username" placeholder="Enter username" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="primary-btn">Continue</button>
</mat-dialog-actions>

<h2 mat-dialog-title>Add Username</h2>

<mat-dialog-content>
  <div class="form-row">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Username</mat-label>
      <input matInput [(ngModel)]="username" placeholder="Enter username" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Office Level</mat-label>
      <mat-select [(ngModel)]="officeLevel">
        <mat-option [value]="2">Circle</mat-option>
        <mat-option [value]="3">Division</mat-option>
        <mat-option [value]="4">Range</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button class="cancel-btn" (click)="close()">Cancel</button>
  <button mat-raised-button class="primary-btn" (click)="save()">Continue</button>
</mat-dialog-actions>

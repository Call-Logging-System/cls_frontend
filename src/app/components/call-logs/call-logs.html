<div class="table-wrapper">
  <div class="table-header">
    <h2>Call Logs</h2>

    <button mat-raised-button class="add-btn">Add Call Log</button>
  </div>

  <table mat-table [dataSource]="dataSource" matSort class="cls-table">
    <!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let element">
        {{ element.date }}
      </td>
    </ng-container>

    <!-- Issue -->
    <ng-container matColumnDef="issue">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Issue</th>
      <td mat-cell *matCellDef="let element">
        {{ element.issue }}
      </td>
    </ng-container>

    <!-- Type -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let element">
        {{ element.type }}
      </td>
    </ng-container>

    <!-- Reported By -->
    <ng-container matColumnDef="reportedBy">
      <th mat-header-cell *matHeaderCellDef>Reported By</th>
      <td mat-cell *matCellDef="let element">
        {{ element.reportedBy }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">
        <span
          class="status-badge"
          [ngClass]="{
            'status-solved': element.status === 'Solved',
            'status-pending': element.status === 'Pending',
          }"
        >
          {{ element.status }}
        </span>
      </td>
    </ng-container>

    <!-- Duration -->
    <ng-container matColumnDef="duration">
      <th mat-header-cell *matHeaderCellDef>Duration</th>
      <td mat-cell *matCellDef="let element">
        {{ element.duration }}
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>Edit</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button class="edit-btn" >
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>
    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef>Delete</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button class="delete-btn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSize]="5"></mat-paginator>
</div>

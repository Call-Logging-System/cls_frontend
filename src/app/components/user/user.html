<div class="cls-page-wrapper">
  <!-- ── Page Header ── -->
  <div class="cls-page-header">
    <div>
      <h2 class="cls-page-title">User Management</h2>
      <div class="cls-page-subtitle">Manage all user accounts and their permissions</div>
    </div>
    <div class="table-actions">
      <button mat-raised-button class="primary-btn" (click)="openAddUserDialog()">
        <mat-icon>add</mat-icon>
        Add User
      </button>
    </div>
  </div>

  <div class="cls-table-card">
    <div class="cls-table-toolbar">
      <div class="cls-table-title-wrap">
        <span class="cls-table-title">Users</span>
        <span class="cls-record-count">{{ dataSource.filteredData.length }} users</span>
      </div>
      <div class="cls-search-wrap">
        <span class="material-icons">search</span>
        <input placeholder="Search users…" (input)="applyFilter($event)" />
      </div>
    </div>

    <!-- Table -->
    <div class="table-overflow">
      <table mat-table [dataSource]="dataSource" class="cls-table">
        <!-- # -->
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef class="col-index">#</th>
          <td mat-cell *matCellDef="let element; let i = index" class="col-index">{{ i + 1 }}</td>
        </ng-container>

        <!-- User Name -->
        <ng-container matColumnDef="userName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>User Name</th>
          <td mat-cell *matCellDef="let element">
            <span class="office-name">{{ element.userName }}</span>
          </td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let element">
            @if (element.email) {
              <div class="cls-contact-cell">
                <span class="material-icons cls-contact-icon">mail_outline</span>
                <span class="cls-email-text">{{ element.email }}</span>
              </div>
            } @else {
              <span class="cls-no-value">—</span>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="edit">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button class="edit-btn" aria-label="Edit" (click)="openEditDialog(element)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="delete">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button class="delete-btn" aria-label="Delete" (click)="openDeleteDialog(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- Empty state -->
        <tr class="mat-row" *matNoDataRow>
          <td [colSpan]="displayedColumns.length">
            <div class="cls-no-data">
              <span class="material-icons">contacts</span>
              <span>No users found</span>
            </div>
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
  </div>
</div>
